services:
  instance1:
    container_name: php_instance1
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 150M

  instance2:
    container_name: php_instance2
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 150M
    

  load-balancer:
    container_name: nginx_load_balancer
    image: nginx:latest
    ports:
      - "9999:9999"
    volumes:
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - instance1
      - instance2
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 50M
