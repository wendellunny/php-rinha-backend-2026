services:
  instance1:
    container_name: php_instance1
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 150M

  instance2:
    container_name: php_instance2
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 150M
    

  load-balancer:
    container_name: nginx_load_balancer
    image: nginx:latest
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - instance1
      - instance2
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 50M
