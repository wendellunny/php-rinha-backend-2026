services:
  instance1:
    container_name: php_instance1
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./server.php:/var/www/html/server.php:ro
      - ./config:/var/www/html/config:ro
      - ./src:/var/www/html/src
      - ./vendor:/var/www/html/vendor
      - ./php/opcache-swoole.ini:/usr/local/etc/php/conf.d/opcache-swoole.ini:ro
      
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 150M

  instance2:
    container_name: php_instance2
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./server.php:/var/www/html/server.php:ro
      - ./config:/var/www/html/config:ro
      - ./src:/var/www/html/src
      - ./vendor:/var/www/html/vendor
      - ./php/opcache-swoole.ini:/usr/local/etc/php/conf.d/opcache-swoole.ini:ro
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 150M
    

  load-balancer:
    container_name: nginx_load_balancer
    image: nginx:latest
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - instance1
      - instance2
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 50M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
